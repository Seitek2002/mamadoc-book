name: Deploy Frontend

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Начинаю деплой фронтенда..."

            cd /home/zhibek/book_front || exit 1

            git fetch origin master
            git reset --hard origin/master

            # --- Пересобираем и перезапускаем фронтенд ---
            cd /home/zhibek/book_back || exit 1
            docker network create book_network 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d --build frontend
            docker compose -f docker-compose.prod.yml restart nginx

            echo "Деплой фронтенда завершён!"