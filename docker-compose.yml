services:
  book-front:
    build: .
    container_name: book-front
    ports:
      - "3000:3000"
    environment:
      # На будущее, когда во фронте появятся реальные запросы
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
    networks:
      - default

networks:
  default:
    name: book_network
    external: true
